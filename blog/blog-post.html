<script src="../script.js"></script>
<script>
const ALLOWED_POSTS = new Set([
  'posts/nature-first-note.md',
  'posts/trips-first-note.md'
]);

function parseFrontmatter(markdown) {
  const match = markdown.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return {};

  return match[1].split('\n').reduce((meta, line) => {
    const separator = line.indexOf(':');
    if (separator === -1) return meta;
    const key = line.slice(0, separator).trim();
    const value = line.slice(separator + 1).trim().replace(/^"|"$/g, '');
    meta[key] = value;
    return meta;
  }, {});
}

function escapeHtml(value) {
  return value
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function inlineMarkdown(value) {
  return escapeHtml(value)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>');
}

function parseMarkdown(markdown) {
  const content = markdown.replace(/^---[\s\S]*?---\n/, '').trim();
  const blocks = content.split(/\n{2,}/);

  return blocks.map((block) => {
    if (block.startsWith('## ')) {
      return `<h2>${inlineMarkdown(block.slice(3))}</h2>`;
    }
    if (/^!\[.*?\]\(.*?\)$/.test(block.trim())) {
      const image = block.trim().match(/^!\[(.*?)\]\((.*?)\)$/);
      return `<figure><img src="${escapeHtml(image[2])}" alt="${escapeHtml(image[1])}" loading="lazy"></figure>`;
    }
    return `<p>${inlineMarkdown(block.replace(/\n/g, ' '))}</p>`;
  }).join('');
}

async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('post');
  const status = document.getElementById('post-status');

  if (!file || !ALLOWED_POSTS.has(file)) {
    status.textContent = 'Entry not found.';
    return;
  }

  try {
    const response = await fetch(file, { cache: 'no-store' });
    if (!response.ok) throw new Error('Entry not found');

    const markdown = await response.text();
    const meta = parseFrontmatter(markdown);

    document.title = `${meta.title || 'Entry'} - Andres Hinojosa`;
    document.getElementById('post-label').textContent = meta.label || meta.category || 'Entry';
    document.getElementById('post-title').textContent = meta.title || 'Untitled entry';
    document.getElementById('post-date').textContent = meta.date || '';
    document.getElementById('post-body').innerHTML = parseMarkdown(markdown);

    status.hidden = true;
    document.getElementById('post-article').hidden = false;
  } catch {
    status.textContent = 'Entry could not be loaded.';
  }
}

loadPost();
</script>
