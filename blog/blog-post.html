<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Andres Hinojosa</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../mediaqueries.css">
  <style>
    .blog-post-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 5rem clamp(2rem, 8%, 8rem) 6rem;
    }
    .blog-post-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-muted);
      text-decoration: none;
      margin-bottom: 3rem;
      transition: color 0.2s;
    }
    .blog-post-back:hover { color: var(--primary-text); text-decoration: none; }
    .blog-post-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-muted);
      margin-bottom: 0.5rem;
    }
    .blog-post-title {
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      font-weight: 500;
      color: var(--primary-text);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .blog-post-date {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--border-color);
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
    }
    .blog-post-body { font-size: 1rem; color: var(--secondary-text); line-height: 1.9; }
    .blog-post-body p { margin-bottom: 1.5rem; }
    .blog-post-body h2 {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--primary-text);
      margin: 2.5rem 0 0.75rem;
      letter-spacing: -0.01em;
    }
    .blog-post-body hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 2.5rem 0;
    }
    .blog-post-body img {
      max-width: 100%;
      width: 300px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      display: block;
      margin: 2rem auto;
    }
    .blog-post-body strong { color: var(--primary-text); font-weight: 500; }
    .blog-post-body em { font-style: italic; }
    .blog-post-body a { color: var(--primary-text); border-bottom: 1px solid var(--border-color); }
    .blog-post-body a:hover { border-color: var(--primary-text); text-decoration: none; }
    .blog-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border-color);
    }
    .blog-nav a {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent-muted);
    }
    .blog-nav a:hover { color: var(--primary-text); text-decoration: none; }
    #loading { color: var(--accent-muted); font-size: 0.85rem; padding: 2rem 0; }
  </style>
</head>

    </li>

<nav id="hamburger-nav">
  <a href="../" class="logo" style="text-decoration:none;">Andres Hinojosa</a>
  <div class="hamburger-menu">
    <div class="hamburger-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="menu-links">
      <li><a href="index.html" onclick="toggleMenu()">← Blog</a></li>
    </div>
  </div>

<div class="blog-post-wrap">
  <a href="index.html" class="blog-post-back">← All posts</a>
  <div id="loading">Loading...</div>
  <div id="post-content" style="display:none;">
    <p class="blog-post-label" id="post-label"></p>
    <h1 class="blog-post-title" id="post-title"></h1>
    <div class="blog-post-date" id="post-date"></div>
    <div class="blog-post-body" id="post-body"></div>
  </div>
  <div class="blog-nav" id="post-nav" style="display:none;">
    <span id="nav-prev"></span>
    <span id="nav-next"></span>
  </div>
</div>

<script src="../script.js"></script>
<script>
// Minimal markdown parser — handles everything needed for these posts
function parseMarkdown(md) {
  // Strip frontmatter
  md = md.replace(/^---[\s\S]*?---\n/, '');

  const lines = md.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Headings
    if (line.startsWith('## ')) {
      html += `<h2>${inline(line.slice(3))}</h2>`;
    } else if (line.startsWith('# ')) {
      html += `<h2>${inline(line.slice(2))}</h2>`;
    }
    // HR
    else if (line.trim() === '---') {
      html += '<hr>';
    }
    // Image: ![alt](src)
    else if (/^!\[.*?\]\(.*?\)$/.test(line.trim())) {
      const m = line.match(/!\[(.*?)\]\((.*?)\)/);
      if (m) html += `<img src="${m[2]}" alt="${m[1]}">`;
    }
    // Empty line — paragraph break
    else if (line.trim() === '') {
      // skip
    }
    // Paragraph
    else {
      // Collect consecutive non-empty, non-special lines
      let para = '';
      while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#') && lines[i].trim() !== '---' && !/^!\[/.test(lines[i].trim())) {
        para += (para ? ' ' : '') + lines[i].trim();
        i++;
      }
      if (para) html += `<p>${inline(para)}</p>`;
      continue;
    }
    i++;
  }
  return html;
}

function inline(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>');
}

function parseFrontmatter(md) {
  const match = md.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return {};
  const meta = {};
  match[1].split('\n').forEach(line => {
    const [key, ...val] = line.split(':');
    if (key) meta[key.trim()] = val.join(':').trim().replace(/^"|"$/g, '');
  });
  return meta;
}

// All posts in order — just add entries here when you add a new .md
const POSTS = [
  { file: 'posts/00-intro.md',  prev: null,              next: 'posts/01-nyc.md' },
  { file: 'posts/01-nyc.md',    prev: 'posts/00-intro.md', next: null },
];

async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('post');

  if (!file) {
    document.getElementById('loading').textContent = 'No post specified.';
    return;
  }

  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error('Not found');
    const raw = await res.text();

    const meta = parseFrontmatter(raw);
    const body = parseMarkdown(raw);

    document.title = `${meta.title || 'Post'} — Andres Hinojosa`;
    document.getElementById('post-label').textContent = meta.label || '';
    document.getElementById('post-title').textContent = meta.title || '';
    document.getElementById('post-date').textContent = meta.date || '';
    document.getElementById('post-body').innerHTML = body;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('post-content').style.display = 'block';

    // Nav
    const entry = POSTS.find(p => p.file === file);
    if (entry) {
      document.getElementById('post-nav').style.display = 'flex';
      if (entry.prev) {
        fetch(entry.prev).then(r => r.text()).then(raw => {
          const m = parseFrontmatter(raw);
          document.getElementById('nav-prev').innerHTML = `<a href="blog-post.html?post=${entry.prev}">← ${m.title}</a>`;
        });
      }
      if (entry.next) {
        fetch(entry.next).then(r => r.text()).then(raw => {
          const m = parseFrontmatter(raw);
          document.getElementById('nav-next').innerHTML = `<a href="blog-post.html?post=${entry.next}">${m.title} →</a>`;
        });
      }
    }
  } catch (e) {
    document.getElementById('loading').textContent = 'Post not found.';
  }
}

loadPost();
</script>
</body>
</html>
