<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&middot;</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .book {
      width: min(680px, 100%);
      min-height: min(80vh, 760px);
      background: var(--section-bg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 6vw, 4rem) 1.5rem;
      position: relative;
    }

    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      animation: pageFade 0.35s ease;
    }

    @keyframes pageFade {
      from { opacity: 0; transform: translateX(6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Title page */
    .title-page {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 1rem;
    }

    .title-page .book-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    .title-page .book-author {
      font-size: 0.9rem;
      color: var(--secondary-text);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .title-page .ornament {
      color: var(--accent-muted);
      letter-spacing: 0.5em;
      font-size: 0.8rem;
      margin: 0.5rem 0;
    }

    /* Regular pages */
    .chapter-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-muted);
      margin-bottom: 0.4rem;
    }

    .chapter-title {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .page-content p {
      margin-bottom: 1rem;
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .page-content p:first-of-type::first-letter {
      font-size: 2.2em;
      float: left;
      line-height: 1;
      padding-right: 0.12em;
      color: var(--accent-color);
    }

    /* Controls */
    .book-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      margin-top: 2rem;
    }

    .page-btn {
      background: none;
      border: 1.5px solid var(--border-strong);
      color: var(--primary-text);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.1rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover:not(:disabled) {
      background: var(--button-bg);
      color: var(--button-text);
    }

    .page-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .page-num {
      font-size: 0.72rem;
      color: var(--accent-muted);
      letter-spacing: 0.08em;
    }

    .back-home {
      position: fixed;
      top: 1.2rem;
      left: 1.4rem;
      font-size: 0.75rem;
      color: var(--accent-muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<a href="/" class="back-home">&larr; back</a>

<div class="book">
  <div class="page-content" id="page-content"></div>
  <div class="book-controls">
    <button class="page-btn" id="prev-btn" onclick="turnPage(-1)" aria-label="Previous page">&larr;</button>
    <span class="page-num" id="page-num"></span>
    <button class="page-btn" id="next-btn" onclick="turnPage(1)" aria-label="Next page">&rarr;</button>
  </div>
</div>

<script src="story.js"></script>
<script>
  // Respect saved theme from the main site
  if (localStorage.getItem('theme') === 'dark') {
    document.body.setAttribute('data-theme', 'dark');
  }

  let current = 0;

  function render() {
    const el = document.getElementById('page-content');
    const p = pages[current];

    if (p.type === 'title') {
      el.className = 'page-content title-page';
      el.innerHTML = `
        <div class="ornament">&middot; &middot; &middot;</div>
        <div class="book-title">${p.title}</div>
        <div class="book-author">${p.author}</div>
        <div class="ornament">&middot; &middot; &middot;</div>
      `;
    } else {
      el.className = 'page-content';
      el.innerHTML =
        (p.label ? `<div class="chapter-label">${p.label}</div>` : '') +
        (p.title ? `<div class="chapter-title">${p.title}</div>` : '') +
        p.body.map(t => `<p>${t}</p>`).join('');
    }

    document.getElementById('prev-btn').disabled = current === 0;
    document.getElementById('next-btn').disabled = current === pages.length - 1;
    document.getElementById('page-num').textContent =
      current === 0 ? '' : `${current} / ${pages.length - 1}`;
  }

  function turnPage(dir) {
    const next = current + dir;
    if (next < 0 || next >= pages.length) return;
    current = next;
    render();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') turnPage(1);
    if (e.key === 'ArrowLeft') turnPage(-1);
  });

  render();
</script>
</body>
</html>
